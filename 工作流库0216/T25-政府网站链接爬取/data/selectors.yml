# 选择器配置文件
version: 1.0

# 全局设置
settings:
  auto_discovery: true  # 自动发现新选择器
  dynamic_update: true  # 动态更新选择器
  validation:
    enabled: true
    check_interval: 3600  # 秒
    min_success_rate: 0.8
  optimization:
    enabled: true
    check_interval: 86400  # 秒
    metrics:
      - success_rate
      - extraction_quality
      - performance
  monitoring:
    enabled: true
    metrics:
      - success_rate
      - extraction_time
      - error_rate
    thresholds:
      success_rate: 0.8
      extraction_time: 1000  # ms
      error_rate: 0.1

# 政府网站选择器配置
government:
  list:
    primary:
      - selector: .xxgk_nav_list li
        weight: 1.0
        fallback: .zwgk_list li
      - selector: .public_list li
        weight: 0.9
        fallback: .news-list li
      - selector: .dynamic-list li
        weight: 0.8
        fallback: .work-list li
    secondary:
      - selector: .summary-list li
        weight: 0.7
      - selector: .report-list li
        weight: 0.6
      - selector: .content-list li
        weight: 0.5
    validation:
      min_items: 1
      max_items: 100
      required_attributes: ["href", "title"]
  
  title:
    primary:
      - selector: .article-list-title a
        weight: 1.0
        fallback: .info-title
      - selector: .zwgk-title
        weight: 0.9
        fallback: .news-title
      - selector: .dynamic-title
        weight: 0.8
        fallback: .work-title
    secondary:
      - selector: .summary-title
        weight: 0.7
      - selector: .report-title
        weight: 0.6
      - selector: .content-title
        weight: 0.5
    validation:
      min_length: 5
      max_length: 200
      required: true
  
  date:
    primary:
      - selector: .info-date
        weight: 1.0
        fallback: .date
      - selector: span.time
        weight: 0.9
        fallback: .news-date
      - selector: .dynamic-date
        weight: 0.8
        fallback: .work-date
    secondary:
      - selector: .summary-date
        weight: 0.7
      - selector: .report-date
        weight: 0.6
      - selector: .content-date
        weight: 0.5
    validation:
      format: ["YYYY-MM-DD", "YYYY年MM月DD日"]
      required: true
      max_future_days: 7
  
  content:
    primary:
      - selector: .article-content
        weight: 1.0
        fallback: .zwgk-content
      - selector: .content
        weight: 0.9
        fallback: .news-content
      - selector: .dynamic-content
        weight: 0.8
        fallback: .work-content
    secondary:
      - selector: .summary-content
        weight: 0.7
      - selector: .report-content
        weight: 0.6
      - selector: .detail-content
        weight: 0.5
    validation:
      min_length: 50
      max_length: 100000
      required: true
      clean_tags: ["script", "style"]
  
  attachment:
    primary:
      - selector: .fujian a
        weight: 1.0
        fallback: .attachment a
      - selector: .enclosure a
        weight: 0.9
        fallback: .download a
      - selector: .file-list a
        weight: 0.8
        fallback: .doc-list a
    validation:
      required: false
      allowed_extensions: [".doc", ".docx", ".pdf", ".xls", ".xlsx"]
      max_size: 20971520  # 20MB

# 新闻网站选择器配置
news:
  list:
    primary:
      - selector: .news-list li
        weight: 1.0
        fallback: .article-list li
      - selector: .list-content li
        weight: 0.9
        fallback: .dynamic-list li
    secondary:
      - selector: .work-list li
        weight: 0.8
      - selector: .summary-list li
        weight: 0.7
    validation:
      min_items: 1
      max_items: 50
      required_attributes: ["href"]
  
  title:
    primary:
      - selector: .news-title
        weight: 1.0
        fallback: .article-title
      - selector: h3 a
        weight: 0.9
        fallback: .dynamic-title
    secondary:
      - selector: .work-title
        weight: 0.8
      - selector: .summary-title
        weight: 0.7
    validation:
      min_length: 5
      max_length: 200
      required: true
  
  date:
    primary:
      - selector: .news-date
        weight: 1.0
        fallback: .article-date
      - selector: .time
        weight: 0.9
        fallback: .dynamic-date
    secondary:
      - selector: .work-date
        weight: 0.8
      - selector: .summary-date
        weight: 0.7
    validation:
      format: ["YYYY-MM-DD HH:mm:ss", "YYYY年MM月DD日 HH:mm"]
      required: true
      max_future_days: 1
  
  content:
    primary:
      - selector: .news-content
        weight: 1.0
        fallback: .article-text
      - selector: .content
        weight: 0.9
        fallback: .dynamic-content
    secondary:
      - selector: .work-content
        weight: 0.8
      - selector: .summary-content
        weight: 0.7
    validation:
      min_length: 100
      max_length: 50000
      required: true
      clean_tags: ["script", "style", "iframe"]
  
  attachment:
    primary:
      - selector: .attachment a
        weight: 1.0
        fallback: .download a
      - selector: .file-list a
        weight: 0.9
    validation:
      required: false
      allowed_extensions: [".jpg", ".png", ".pdf"]
      max_size: 10485760  # 10MB

# 通用网站选择器配置
general:
  list:
    primary:
      - selector: .list li
        weight: 1.0
        fallback: .content-list li
      - selector: ul.list > li
        weight: 0.9
        fallback: .dynamic-list li
    secondary:
      - selector: .work-list li
        weight: 0.8
      - selector: .summary-list li
        weight: 0.7
    validation:
      min_items: 1
      max_items: 30
      required_attributes: ["href"]
  
  title:
    primary:
      - selector: a
        weight: 1.0
        fallback: .title
      - selector: h3
        weight: 0.9
        fallback: .dynamic-title
    secondary:
      - selector: .work-title
        weight: 0.8
      - selector: .summary-title
        weight: 0.7
    validation:
      min_length: 3
      max_length: 150
      required: true
  
  date:
    primary:
      - selector: .date
        weight: 1.0
        fallback: .time
      - selector: span:last-child
        weight: 0.9
        fallback: .dynamic-date
    secondary:
      - selector: .work-date
        weight: 0.8
      - selector: .summary-date
        weight: 0.7
    validation:
      format: ["YYYY-MM-DD", "MM/DD/YYYY", "DD/MM/YYYY"]
      required: false
      max_future_days: 30
  
  content:
    primary:
      - selector: .content
        weight: 1.0
        fallback: .main-content
      - selector: .text
        weight: 0.9
        fallback: .dynamic-content
    secondary:
      - selector: .work-content
        weight: 0.8
      - selector: .summary-content
        weight: 0.7
    validation:
      min_length: 20
      max_length: 200000
      required: true
      clean_tags: ["script", "style", "iframe", "form"]
  
  attachment:
    primary:
      - selector: .attachment a
        weight: 1.0
        fallback: .file-list a
      - selector: .doc-list a
        weight: 0.9
    validation:
      required: false
      allowed_extensions: ["*"]
      max_size: 52428800  # 50MB

# 动态发现规则
discovery_rules:
  - type: pattern_match
    pattern: "list|content|article"
    category: list
    min_confidence: 0.8
  
  - type: attribute_match
    attributes: ["title", "alt"]
    category: title
    min_confidence: 0.9
  
  - type: text_match
    pattern: "\\d{4}[-年/]\\d{1,2}[-月/]\\d{1,2}"
    category: date
    min_confidence: 0.95

# 优化规则
optimization_rules:
  - type: selector_ranking
    enabled: true
    metrics:
      - success_rate
      - extraction_quality
      - performance
    adjustment_interval: 86400  # 秒
  
  - type: fallback_management
    enabled: true
    metrics:
      - success_rate
      - error_rate
    adjustment_interval: 3600  # 秒
  
  - type: validation_rules
    enabled: true
    metrics:
      - false_positive_rate
      - false_negative_rate
    adjustment_interval: 86400  # 秒

# 监控规则
monitoring_rules:
  - type: extraction_quality
    check_interval: 300  # 秒
    metrics:
      - success_rate
      - error_rate
      - extraction_time
    thresholds:
      success_rate: 0.8
      error_rate: 0.1
      extraction_time: 1000  # ms
  
  - type: selector_health
    check_interval: 3600  # 秒
    metrics:
      - usage_count
      - failure_rate
      - average_performance
    thresholds:
      failure_rate: 0.2
      performance_degradation: 0.3
  
  - type: validation_quality
    check_interval: 86400  # 秒
    metrics:
      - false_positive_rate
      - false_negative_rate
      - validation_time
    thresholds:
      false_positive_rate: 0.1
      false_negative_rate: 0.1
      validation_time: 500  # ms
</rewritten_file> 