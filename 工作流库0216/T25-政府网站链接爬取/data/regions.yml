# 区域配置文件
version: 1.0

# 全局设置
settings:
  auto_discovery: true  # 自动发现新网站
  dynamic_update: true  # 动态更新配置
  validation:
    enabled: true
    check_interval: 3600  # 秒
    retry_count: 3
  monitoring:
    enabled: true
    metrics:
      - availability
      - response_time
      - update_frequency
    thresholds:
      availability: 0.95
      response_time: 2000  # ms
      update_frequency: 86400  # 秒

# 中央部委网站
central_government:
  - name: 国家发改委
    domain: ndrc.gov.cn
    priority: 1
    update_frequency: 3600  # 秒
    retry_strategy:
      max_retries: 3
      interval: 300  # 秒
    urls:
      - url: https://www.ndrc.gov.cn/xwdt/tzgg/
        type: notice
        priority: 1
        check_interval: 1800  # 秒
        selectors:
          title: ".list-title"
          date: ".list-date"
          content: ".article-content"
      - url: https://www.ndrc.gov.cn/xwdt/gzdt/
        type: news
        priority: 2
        check_interval: 3600  # 秒
        selectors:
          title: ".list-title"
          date: ".list-date"
          content: ".article-content"
  
