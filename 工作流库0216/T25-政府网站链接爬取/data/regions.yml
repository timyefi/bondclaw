# 动态发现规则
discovery_rules:
  - type: domain_pattern
    pattern: "*.gov.cn"
    priority: 1
    auto_add: true
  
  - type: content_pattern
    pattern: "政府门户网站"
    priority: 2
    auto_add: true
  
  - type: link_pattern
    pattern: "/zwgk/"
    priority: 1
    auto_add: true

# 监控规则
monitoring_rules:
  - type: availability
    check_interval: 300  # 秒
    threshold: 0.95
    alert_threshold: 0.9
  
  - type: response_time
    check_interval: 300
    threshold: 2000  # ms
    alert_threshold: 3000
  
  - type: update_frequency
    check_interval: 3600
    threshold: 86400  # 秒
    alert_threshold: 172800

# 优化规则
optimization_rules:
  - type: priority_adjustment
    enabled: true
    metrics:
      - update_frequency
      - content_quality
      - user_feedback
    adjustment_interval: 86400  # 秒
  
  - type: resource_allocation
    enabled: true
    metrics:
      - priority
      - response_time
      - success_rate
    adjustment_interval: 3600
  
  - type: crawl_strategy
    enabled: true
    metrics:
      - content_update_pattern
      - resource_usage
      - error_rate
    adjustment_interval: 3600
